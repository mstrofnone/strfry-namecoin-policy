name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Run tests
        run: npm test

      - name: Verify generated TypeScript declarations are up to date
        if: matrix.node == '22'
        run: |
          npm run build:types
          if ! git diff --quiet -- dist/; then
            echo "::error::dist/ is out of date. Run 'npm run build:types' and commit the result."
            git --no-pager diff -- dist/
            exit 1
          fi
